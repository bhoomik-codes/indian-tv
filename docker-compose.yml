# ──────────────────────────────────────────────────────────────────────────────
# IndiaStream — Docker Compose
#
# Usage:
#   docker compose up            # start with cached playlist
#   docker compose up -e RESCAN=true   # force a fresh channel scan
#   docker compose down -v       # stop and delete volumes
# ──────────────────────────────────────────────────────────────────────────────
name: indiastream

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: indiastream:latest
    container_name: indiastream
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${PROXY_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      # Override OUTPUT_FILE to write inside the volume
      OUTPUT_FILE: public/working.m3u
    volumes:
      # Persist the generated playlist and static files across restarts
      - playlist_data:/app/public
      # Persist server logs
      - log_data:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  # Named volume: holds index.html, CSS, JS, and working.m3u
  playlist_data:
    driver: local

  # Named volume: holds proxy.log and http.log
  log_data:
    driver: local
